<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "License Plate Road Trip",
  "schemaVersion": 1,
  "description": "Interactive, searchable license plate game for road trips. 258 plates across all 50 states + DC, with tap-to-spot, scoring by rarity, and per-state progress. Curated subset of jonkeegan/us-license-plates."
}
</script>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>License Plate Road Trip</title>
<style>
:root{
  color-scheme: light;
  --bg:#fafaf7;
  --ink:#1b1d22;
  --muted:#6b7280;
  --line:#e5e7eb;
  --accent:#1d4ed8;
  --good:#15803d;
  --rare:#b45309;
  --uncommon:#1d4ed8;
  --common:#475569;
  --card:#ffffff;
  --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.05);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
}
header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--line)}
.bar{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
h1{margin:0;font-size:17px;font-weight:700;letter-spacing:-.01em}
h1 .em{color:var(--accent)}
.score{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink)}
.score small{color:var(--muted);font-weight:500}
.progress{height:6px;background:#eef0f4}
.progress > div{height:100%;background:linear-gradient(90deg,#1d4ed8,#0ea5e9);transition:width .3s ease;width:0%}
.controls{padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--line);background:#fff;align-items:center}
.search{flex:1 1 220px;min-width:160px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;background:#fff}
.search:focus{outline:2px solid #c7d2fe;border-color:#a5b4fc}
select{border:1px solid var(--line);border-radius:10px;padding:8px 10px;font:inherit;background:#fff;color:var(--ink)}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 11px;border-radius:999px;font:13px/1 inherit;cursor:pointer}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.reset{background:none;border:1px solid var(--line);color:var(--muted);padding:7px 11px;border-radius:999px;font:13px/1 inherit;cursor:pointer}
main{padding:14px;max-width:1100px;margin:0 auto}
.summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:13px;color:var(--muted)}
.summary strong{color:var(--ink)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px}
.plate{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow);transition:transform .08s ease, border-color .2s, background .2s;position:relative;min-height:120px;font:inherit;color:inherit}
.plate:active{transform:scale(.98)}
.plate .state{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
.plate .title{font-weight:650;font-size:14px;line-height:1.3;color:var(--ink);flex:1}
.plate .meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted)}
.plate .rarity{font-weight:600}
.plate .rarity.common{color:var(--common)}
.plate .rarity.uncommon{color:var(--uncommon)}
.plate .rarity.rare{color:var(--rare)}
.plate.found{background:#ecfdf5;border-color:#86efac}
.plate.found::after{content:"\2713";position:absolute;top:8px;right:10px;background:var(--good);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.plate.found .title{color:#065f46}
.empty{padding:30px;text-align:center;color:var(--muted)}
footer{padding:24px 16px 60px;text-align:center;color:var(--muted);font-size:12px}
@media (max-width: 480px){.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.plate{min-height:108px;padding:10px}h1{font-size:16px}}
</style>
</head>
<body>
<header>

    <h1>&#128739;&#65039; License Plate <span class="em">Road Trip</span></h1>
    <div class="score" id="score">0 <small>pts</small></div>
  </div>
  <div class="progress"><div id="bar"></div></div>
  <div class="controls">
    <input class="search" id="q" placeholder="Search plates or states&hellip;" autocomplete="off">
    <select id="state"><option value="">All states (51)</option></select>
    <select id="cat">
      <option value="">All categories</option>
      <option value="s">Standard</option>
      <option value="sc">Scenic</option>

      <option value="sp">Sports</option>
      <option value="m">Military / Vet</option>
      <option value="o">Organization</option>
      <option value="e">Environmental</option>
      <option value="x">Special</option>
    </select>
    <button class="chip" id="hide" type="button">Hide spotted</button>
    <button class="reset" id="reset" type="button">Reset</button>
  </div>
</header>

<main>
  <div class="summary" id="summary"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>No plates match your filters.</div>
</main>

<footer>
  MVP v1 &middot; <span id="total">0</span> plates &middot; curated subset of <strong>jonkeegan/us-license-plates</strong> (8,331 total). Tap a card to mark as spotted.
</footer>

const CAT = {s:"Standard",sc:"Scenic",u:"University",sp:"Sports",m:"Military",o:"Organization",e:"Environmental",x:"Special"};
const RAR = {c:"Common",u:"Uncommon",r:"Rare"};
const PTS = {c:1,u:3,r:10};
const RAR_LONG = {c:"common",u:"uncommon",r:"rare"};

const PLATES = PLATES_RAW.split("\n").map((row,i)=>{
  const [state,title,cat,rar] = row.split("|");
  return {id:i, state, title, cat, rar};
});

const STORE_KEY = "lpgame.found.v1";
let found;
try { found = new Set(JSON.parse(localStorage.getItem(STORE_KEY) || "[]")); }
catch(e){ found = new Set(); }
function persist(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify([...found])); }catch(e){} }

const $q = document.getElementById("q");
const $state = document.getElementById("state");
const $cat = document.getElementById("cat");
const $hide = document.getElementById("hide");
const $reset = document.getElementById("reset");
const $grid = document.getElementById("grid");
const $score = document.getElementById("score");
const $bar = document.getElementById("bar");
const $summary = document.getElementById("summary");
const $empty = document.getElementById("empty");
document.getElementById("total").textContent = PLATES.length;

const stateCounts = {};
PLATES.forEach(p => { stateCounts[p.state] = (stateCounts[p.state]||0)+1; });
Object.entries(STATE_NAMES).sort((a,b)=>a[1].localeCompare(b[1])).forEach(([code,name])=>{
  const opt = document.createElement("option");
  opt.value = code;
  opt.textContent = name + " (" + (stateCounts[code]||0) + ")";
  $state.appendChild(opt);
});

let hideSpotted = false;
$hide.addEventListener("click", ()=>{
  hideSpotted = !hideSpotted;
  $hide.classList.toggle("active", hideSpotted);
  $hide.textContent = hideSpotted ? "Show spotted" : "Hide spotted";
  render();
});
$q.addEventListener("input", render);
$state.addEventListener("change", render);
$cat.addEventListener("change", render);
$reset.addEventListener("click", ()=>{
  if(confirm("Reset all spotted plates? This can't be undone.")){
    found.clear(); persist(); render();
  }
});

function pointsTotal(){
  let s = 0;
  for(const id of found){
    const p = PLATES[id]; if(!p) continue;
    s += PTS[p.rar] || 1;
  }
  return s;
}
function statesProgress(){
  const byState = {};
  PLATES.forEach(p => {
    byState[p.state] = byState[p.state] || {total:0, found:0};
    byState[p.state].total++;
    if(found.has(p.id)) byState[p.state].found++;
  });
  let any = 0, full = 0;
  for(const k of Object.keys(byState)){
    if(byState[k].found > 0) any++;
    if(byState[k].found === byState[k].total) full++;
  }
  return {any, full};
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}

function render(){
  const q = $q.value.trim().toLowerCase();
  const stateF = $state.value;
  const catF = $cat.value;
  const filtered = PLATES.filter(p=>{
    if(stateF && p.state !== stateF) return false;
    if(catF && p.cat !== catF) return false;
    if(hideSpotted && found.has(p.id)) return false;
    if(q){
      const hay = (p.title + " " + p.state + " " + (STATE_NAMES[p.state]||"") + " " + (CAT[p.cat]||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  $empty.hidden = filtered.length > 0;

  const pts = pointsTotal();
  const sp = statesProgress();
  $score.innerHTML = pts + " <small>pts</small>";
  const pct = (found.size / PLATES.length) * 100;
  $bar.style.width = pct.toFixed(1) + "%";
  $summary.innerHTML =
    "<span><strong>" + found.size + "</strong> / " + PLATES.length + " spotted (" + pct.toFixed(1) + "%)</span>" +
    "<span>&middot;</span>" +
    "<span><strong>" + sp.any + "</strong> states started &middot; <strong>" + sp.full + "</strong> completed</span>" +
    "<span>&middot;</span>" +
    "<span>Showing <strong>" + filtered.length + "</strong></span>";

  $grid.innerHTML = "";
  const frag = document.createDocumentFragment();
  filtered.forEach(p=>{
    const el = document.createElement("button");
    el.type = "button";
    el.className = "plate" + (found.has(p.id) ? " found":"");
    el.dataset.id = p.id;
    el.innerHTML =
      '<div class="state">' + escapeHtml(STATE_NAMES[p.state] || p.state) + ' &middot; ' + escapeHtml(p.state) + '</div>' +
      '<div class="title">' + escapeHtml(p.title) + '</div>' +
      '<div class="meta"><span>' + escapeHtml(CAT[p.cat] || "Other") + '</span>' +
      '<span class="rarity ' + RAR_LONG[p.rar] + '">' + escapeHtml(RAR[p.rar]) + ' &middot; ' + PTS[p.rar] + 'pt' + (PTS[p.rar]>1?'s':'') + '</span></div>';
    el.addEventListener("click", ()=>{
      if(found.has(p.id)) found.delete(p.id);
      else found.add(p.id);
      persist();
      render();
    });
    frag.appendChild(el);
  });
  $grid.appendChild(frag);
}

render();
</script>

</html>
