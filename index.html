<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>License Plate Road Trip</title>
<meta name="description" content="Search and spot every U.S. license plate. Built on jonkeegan/us-license-plates.">
<meta name="theme-color" content="#1d4ed8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Plate Game">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231d4ed8'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dy='.35em' fill='white' font-family='sans-serif' font-size='30' font-weight='700'%3ELP%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%231d4ed8'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dy='.35em' fill='white' font-family='sans-serif' font-size='86' font-weight='700'%3ELP%3C/text%3E%3C/svg%3E">
<style>
:root{
  color-scheme: light;
  --bg:#fafaf7;
  --ink:#1b1d22;
  --muted:#6b7280;
  --line:#e5e7eb;
  --accent:#1d4ed8;
  --good:#15803d;
  --card:#ffffff;
  --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.05);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--ink);
  font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line)}
.bar{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
h1{margin:0;font-size:16px;font-weight:700;letter-spacing:-.01em}
h1 .em{color:var(--accent)}
.score{font-variant-numeric:tabular-nums;font-weight:700}
.score small{color:var(--muted);font-weight:500}
.progress{height:6px;background:#eef0f4}
.progress > div{height:100%;background:linear-gradient(90deg,#1d4ed8,#0ea5e9);transition:width .3s ease;width:0%}
.controls{padding:8px 14px;display:flex;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--line);background:#fff;align-items:center}
.search{flex:1 1 220px;min-width:160px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;background:#fff;-webkit-appearance:none}
.search:focus{outline:2px solid #c7d2fe;border-color:#a5b4fc}
select{border:1px solid var(--line);border-radius:10px;padding:8px 10px;font:inherit;background:#fff;color:var(--ink);max-width:50%}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 11px;border-radius:999px;font:13px/1 inherit;cursor:pointer}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.reset{background:none;border:1px solid var(--line);color:var(--muted);padding:7px 11px;border-radius:999px;font:13px/1 inherit;cursor:pointer}
main{padding:12px;max-width:1200px;margin:0 auto}
.summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;font-size:13px;color:var(--muted)}
.summary strong{color:var(--ink)}
.loading{padding:40px 16px;text-align:center;color:var(--muted)}
.loading.error{color:#991b1b;text-align:left;background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:16px;font-size:14px;line-height:1.5}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.plate{
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:0;cursor:pointer;text-align:left;display:flex;flex-direction:column;
  box-shadow:var(--shadow);transition:transform .08s,border-color .2s,background .2s;
  position:relative;overflow:hidden;font:inherit;color:inherit;
}
.plate:active{transform:scale(.98)}
.plate-img{
  aspect-ratio:2/1;background:#f3f4f6;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.plate-img img{width:100%;height:100%;object-fit:cover;display:block}
.plate-img.fallback::before{
  content:attr(data-state);
  position:absolute;top:6px;left:8px;font:600 10px/1 monospace;color:#94a3b8;letter-spacing:.1em;
}
.plate-img.fallback::after{
  content:attr(data-title);
  font:600 12px/1.2 -apple-system,BlinkMacSystemFont,sans-serif;color:#1f2937;
  text-align:center;padding:0 10px;
}
.plate-meta{padding:8px 10px;display:flex;flex-direction:column;gap:2px;flex:1}
.plate-meta .state{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
.plate-meta .title{font-weight:600;font-size:13px;line-height:1.25;color:var(--ink)}
.plate.found{background:#ecfdf5;border-color:#86efac}
.plate.found .plate-img::after{
  content:"\2713";
  position:absolute;top:6px;right:6px;
  background:var(--good);color:#fff;width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  z-index:2;
}
.plate.found .title{color:#065f46}
.empty{padding:30px;text-align:center;color:var(--muted)}
#sentinel{height:1px}
footer{padding:24px 16px 60px;text-align:center;color:var(--muted);font-size:12px}
footer a{color:var(--accent)}
@media (max-width: 480px){
  .grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  h1{font-size:15px}
  .controls{padding:6px 10px}
  main{padding:10px}
}
</style>
</head>
<body>
<header>
  <div class="bar">
    <h1>&#128739;&#65039; License Plate <span class="em">Road Trip</span></h1>
    <div class="score" id="score">0 <small>spotted</small></div>
  </div>
  <div class="progress"><div id="bar"></div></div>
  <div class="controls">
    <input class="search" id="q" placeholder="Search plates or states&hellip;" autocomplete="off" inputmode="search">
    <select id="state"><option value="">All states</option></select>
    <button class="chip" id="hide" type="button">Hide spotted</button>
    <button class="reset" id="reset" type="button">Reset</button>
  </div>
</header>

<main>
  <div class="loading" id="loading">Loading plates&hellip;</div>
  <div class="summary" id="summary" hidden></div>
  <div class="grid" id="grid"></div>
  <div id="sentinel"></div>
  <div class="empty" id="empty" hidden>No plates match your filters.</div>
</main>

<footer>
  Data &amp; images: <a href="https://github.com/jonkeegan/us-license-plates" target="_blank" rel="noopener">jonkeegan/us-license-plates</a> &middot;
  <span id="total">0</span> plates loaded &middot;
  Tap a plate to mark spotted. Progress saved on this device.
</footer>

<script>
"use strict";

const STATE_NAMES = {
  AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",CO:"Colorado",
  CT:"Connecticut",DE:"Delaware",DC:"District of Columbia",FL:"Florida",GA:"Georgia",
  HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",
  LA:"Louisiana",ME:"Maine",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",
  MS:"Mississippi",MO:"Missouri",MT:"Montana",NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",
  NJ:"New Jersey",NM:"New Mexico",NY:"New York",NC:"North Carolina",ND:"North Dakota",
  OH:"Ohio",OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",
  SD:"South Dakota",TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",VA:"Virginia",
  WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming"
};

let PLATES = [];
let filteredCache = [];
let renderedCount = 0;
const BATCH = 200;

const STORE_KEY = "lpgame.found.v2";
let found;
try { found = new Set(JSON.parse(localStorage.getItem(STORE_KEY) || "[]")); }
catch(e){ found = new Set(); }
function persist(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify([...found])); }catch(e){} }

const $ = id => document.getElementById(id);
const $q = $("q"), $state = $("state"), $hide = $("hide"), $reset = $("reset");
const $grid = $("grid"), $score = $("score"), $bar = $("bar");
const $summary = $("summary"), $empty = $("empty"), $loading = $("loading");
const $sentinel = $("sentinel"), $total = $("total");

let hideSpotted = false;

function escapeHtml(s){return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}

function parseCSV(text){
  const rows = [];
  let row = [], cell = "", inQ = false, i = 0, N = text.length;
  while(i < N){
    const c = text[i];
    if(inQ){
      if(c === '"'){
        if(text[i+1] === '"'){ cell += '"'; i += 2; continue; }
        inQ = false; i++;
      } else { cell += c; i++; }
    } else {
      if(c === '"'){ inQ = true; i++; }
      else if(c === ','){ row.push(cell); cell = ""; i++; }
      else if(c === '\n'){ row.push(cell); rows.push(row); row = []; cell = ""; i++; }
      else if(c === '\r'){ i++; }
      else { cell += c; i++; }
    }
  }
  if(cell.length || row.length){ row.push(cell); rows.push(row); }
  return rows;
}

async function init(){
  try {
    const res = await fetch("./us-license-plates.csv", {cache: "force-cache"});
    if(!res.ok) throw new Error("HTTP " + res.status + " loading CSV");
    const text = await res.text();
    const rows = parseCSV(text);
    if(!rows.length) throw new Error("Empty CSV");
    const header = rows[0].map(h => h.trim());
    const sIdx = header.indexOf("state");
    const tIdx = header.indexOf("plate_title");
    const iIdx = header.indexOf("plate_img");
    if(sIdx < 0 || tIdx < 0) throw new Error("Unexpected CSV columns: " + header.join(","));
    PLATES = rows.slice(1)
      .filter(r => r[sIdx] && r[tIdx])
      .map((r, i) => ({
        id: i,
        state: r[sIdx].trim(),
        title: r[tIdx].trim(),
        img: (r[iIdx] || "").trim()
      }));
    $loading.hidden = true;
    $summary.hidden = false;
    $total.textContent = PLATES.length.toLocaleString();
    populateStates();
    applyFilters();
    setupObserver();
  } catch(err){
    $loading.classList.add("error");
    $loading.innerHTML =
      "<strong>Couldn&rsquo;t load <code>us-license-plates.csv</code>.</strong><br><br>" +
      "Make sure this <code>index.html</code> is sitting next to <code>us-license-plates.csv</code> " +
      "and the <code>plates/</code> folder in your repo. " +
      "If you&rsquo;re opening it from disk, use a local server (e.g. <code>python3 -m http.server</code>) " +
      "or deploy via GitHub Pages.<br><br>" +
      "<small>" + escapeHtml(err.message) + "</small>";
  }
}

function populateStates(){
  const counts = {};
  PLATES.forEach(p => { counts[p.state] = (counts[p.state]||0) + 1; });
  Object.entries(STATE_NAMES)
    .sort((a,b) => a[1].localeCompare(b[1]))
    .forEach(([code, name]) => {
      if(!counts[code]) return;
      const opt = document.createElement("option");
      opt.value = code;
      opt.textContent = name + " (" + counts[code] + ")";
      $state.appendChild(opt);
    });
}

function statesProgress(){
  const byState = {};
  for(const p of PLATES){
    const b = byState[p.state] || (byState[p.state] = {total:0, found:0});
    b.total++;
    if(found.has(p.id)) b.found++;
  }
  let any = 0, full = 0;
  for(const k of Object.keys(byState)){
    if(byState[k].found > 0) any++;
    if(byState[k].found === byState[k].total) full++;
  }
  return {any, full};
}

function applyFilters(){
  const q = $q.value.trim().toLowerCase();
  const stateF = $state.value;
  filteredCache = PLATES.filter(p => {
    if(stateF && p.state !== stateF) return false;
    if(hideSpotted && found.has(p.id)) return false;
    if(q){
      const hay = (p.title + " " + p.state + " " + (STATE_NAMES[p.state]||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  renderedCount = 0;
  $grid.innerHTML = "";
  $empty.hidden = filteredCache.length > 0;
  renderMore();
  updateSummary();
}

function renderMore(){
  const slice = filteredCache.slice(renderedCount, renderedCount + BATCH);
  if(slice.length === 0) return;
  const frag = document.createDocumentFragment();
  for(const p of slice) frag.appendChild(buildCard(p));
  $grid.appendChild(frag);
  renderedCount += slice.length;
}

function buildCard(p){
  const el = document.createElement("button");
  el.type = "button";
  el.className = "plate" + (found.has(p.id) ? " found" : "");
  el.dataset.id = p.id;
  const stateLong = STATE_NAMES[p.state] || p.state;
  const imgSrc = p.img ? "./plates/" + encodeURIComponent(p.state) + "/" + encodeURI(p.img) : "";
  el.innerHTML =
    '<div class="plate-img" data-state="' + escapeHtml(p.state) + '" data-title="' + escapeHtml(p.title) + '">' +
      (imgSrc
        ? '<img loading="lazy" decoding="async" alt="" src="' + escapeHtml(imgSrc) + '" onerror="this.parentNode.classList.add(\'fallback\');this.remove();">'
        : '') +
    '</div>' +
    '<div class="plate-meta">' +
      '<div class="state">' + escapeHtml(p.state) + ' &middot; ' + escapeHtml(stateLong) + '</div>' +
      '<div class="title">' + escapeHtml(p.title) + '</div>' +
    '</div>';
  el.addEventListener("click", () => {
    if(found.has(p.id)) found.delete(p.id);
    else found.add(p.id);
    persist();
    el.classList.toggle("found", found.has(p.id));
    updateSummary();
  });
  return el;
}

function updateSummary(){
  const sp = statesProgress();
  const total = PLATES.length || 1;
  const pct = (found.size / total) * 100;
  $score.innerHTML = found.size.toLocaleString() + ' <small>spotted</small>';
  $bar.style.width = pct.toFixed(2) + "%";
  $summary.innerHTML =
    "<span><strong>" + found.size.toLocaleString() + "</strong> / " + total.toLocaleString() + " spotted (" + pct.toFixed(1) + "%)</span>" +
    "<span>&middot;</span>" +
    "<span><strong>" + sp.any + "</strong> states started &middot; <strong>" + sp.full + "</strong> completed</span>" +
    "<span>&middot;</span>" +
    "<span>Showing <strong>" + filteredCache.length.toLocaleString() + "</strong></span>";
}

function setupObserver(){
  const io = new IntersectionObserver(entries => {
    for(const e of entries){
      if(e.isIntersecting && renderedCount < filteredCache.length) renderMore();
    }
  }, {rootMargin: "600px"});
  io.observe($sentinel);
}

let qDeb;
$q.addEventListener("input", () => { clearTimeout(qDeb); qDeb = setTimeout(applyFilters, 120); });
$state.addEventListener("change", applyFilters);
$hide.addEventListener("click", () => {
  hideSpotted = !hideSpotted;
  $hide.classList.toggle("active", hideSpotted);
  $hide.textContent = hideSpotted ? "Show spotted" : "Hide spotted";
  applyFilters();
});
$reset.addEventListener("click", () => {
  if(confirm("Reset all spotted plates? This can't be undone.")){
    found.clear(); persist(); applyFilters();
  }
});

init();
</script>
</body>
</html>
